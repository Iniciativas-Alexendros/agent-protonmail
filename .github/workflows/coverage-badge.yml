# ---------------------------------------------------------------------------
# coverage-badge.yml
#
# Genera coverage-badge.json con vitest --coverage y lo despliega en la
# branch gh-pages. El README.md referencia un shields.io endpoint badge que
# lee el JSON desde raw.githubusercontent.com — cero commits a main.
#
# Se ejecuta en push a main y manualmente con workflow_dispatch.
# ---------------------------------------------------------------------------
name: Coverage Badge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coverage-badge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-badge:
    name: Update coverage badge
    runs-on: [self-hosted, ts]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest with coverage
        run: npx vitest run --coverage

      - name: Generate badge JSON
        run: bash scripts/update-coverage-badge.sh --skip-run

      - name: Deploy badge to gh-pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475c49a8f5667c3c # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./coverage
          destination_dir: ./
          keep_files: false
          commit_message: "chore: auto-update coverage badge"
